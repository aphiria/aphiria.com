apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  namespace: aphiria.com
  labels:
    app: web
spec:
  selector:
    matchLabels:
      app: web
  replicas: 2
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: registry.digitalocean.com/aphiria-dot-com/aphiria/nginx:latest
          ports:
            - containerPort: 27018
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: aphiria.com
  labels:
    app: web
spec:
  selector:
    app: web
  ports:
    - port: 27018
      protocol: TCP
      targetPort: 27018
