name: ci
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php: ['8.0']
        stability: [prefer-stable]
    name: Build Website
    env:
      # Set these so that views are compiled with correct links
      APP_WEB_URL: https://www.aphiria.com
      APP_API_URL: https://api.aphiria.com
    steps:
      # TODO: Update the identical step at the end, and remove this once I'm done debugging it
      #- name: Pull Images to Docker Host
      #  uses: appleboy/ssh-action@v0.1.4
      #  with:
      #    host: ${{ secrets.SSH_HOST }}
      #    port: ${{ secrets.SSH_PORT }}
      #    username: ${{ secrets.SSH_USER }}
      #    key: ${{ secrets.SSH_PRIVATE_KEY }}
      #    passphrase: ${{ secrets.SSH_PASSPHRASE }}
      #    script: |
      #      cd aphiria.com
      #      docker-compose ps
      #      docker-compose pull
      #      docker-compose -f ./docker-compose.yml -f ./docker-compose.prod.yml up -d
      #      docker-compose -f ./docker-compose.yml -f ./docker-compose.prod.yml exec -T php php aphiria docs:index

      - name: Check Out Code
        uses: actions/checkout@v2
      - name: Set Up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, dom, libxml, mbstring, pcntl, zip
          tools: composer:v2
      - name: Install Composer Dependencies
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction --no-progress
      - name: Optimize Autload
        run: composer dump-autoload -o
      - name: Run Unit Tests
        run: vendor/bin/phpunit --testsuite Unit --verbose
      - name: Run Linter
        run: composer phpcs-test
      - name: Run Psalm Static Analysis
        run: composer psalm
      - name: Build Gulp
        run: yarn install && yarn global add gulp && gulp build
