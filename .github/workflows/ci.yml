name: ci
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php: ['8.0']
        stability: [prefer-stable]
    name: Build Website
    env:
      # Set these so that views are compiled with correct links
      APP_WEB_URL: http://204.48.28.188:80 # TODO: Use this prod value: https://www.aphiria.com
      APP_API_URL: http://204.48.28.188:8080 # TODO: Use this prod value: https://api.aphiria.com
    steps:
      - name: Check Out Code
        uses: actions/checkout@v2
      - name: Set Up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, dom, libxml, mbstring, pcntl, zip
          tools: composer:v2
      - name: Install Composer Dependencies
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction --no-progress
      - name: Optimize Autload
        run: composer dump-autoload -o
      - name: Run Unit Tests
        run: vendor/bin/phpunit --testsuite Unit --verbose
      - name: Run Linter
        run: composer phpcs-test
      - name: Run Psalm Static Analysis
        run: composer psalm
      - name: Build Gulp
        run: yarn install && yarn global add gulp && gulp build
