      - name: Copy .env File
        run: |
          touch .env
          echo ${{ secrets.APHIRIA_DOT_COM_DOT_ENV }} >> .env
          cat .env
      - name: Build Docker Images
        run: docker-compose -f ./docker-compose.yml -f ./docker-compose.prod.yml up -d
      - name: Build Documentation Search Index for Integration Tests
        run: docker-compose -f ./docker-compose.yml -f ./docker-compose.prod.yml exec -T php php aphiria docs:index
      - name: Run integration tests
        run: docker-compose -f ./docker-compose.yml -f ./docker-compose.prod.yml exec -T php vendor/bin/phpunit --testsuite Integration --configuration phpunit.xml.dist --verbose
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITAL_OCEAN_PAT }}
      - name: Publish Images to Digital Ocean Container Registry
        run: |
          doctl registry login
          docker-compose push
      - name: Pull Images to Docker Host
        uses: appleboy/ssh-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd aphiria.com
            docker-compose ps
            docker-compose pull
            docker-compose -f ./docker-compose.yml -f ./docker-compose.prod.yml up -d
            docker-compose -f ./docker-compose.yml -f ./docker-compose.prod.yml exec -T php php aphiria docs:index
