      - name: Copy .env File
        run: |
          touch .env
          echo ${{ secrets.APHIRIA_DOT_COM_DOT_ENV }} >> .env
          cat .env
      - name: Build Docker Images
        run: docker-compose -f ./docker-compose.yml -f ./docker-compose.dev.yml up -d # TODO: Switch this to docker-compose.prod.yml once we've worked out kinks
      - name: Build Documentation Search Index
        run: docker-compose -f ./docker-compose.yml -f ./docker-compose.dev.yml exec -T php php aphiria docs:index # TODO: Switch this to docker-compose.prod.yml once we've worked out kinks
      - name: Run integration tests
        run: docker-compose -f ./docker-compose.yml -f ./docker-compose.dev.yml exec -T php vendor/bin/phpunit --testsuite Integration --configuration phpunit.xml.dist --verbose # TODO: Switch this to docker-compose.prod.yml once we've
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITAL_OCEAN_PAT }}
      - name: Publish Images to Digital Ocean Container Registry
        run: |
          doctl registry login
          docker tag aphiria/nginx:latest registry.digitalocean.com/registry.digitalocean.com/aphiria-dot-com/aphiria/php:latest
          docker push registry.digitalocean.com/aphiria-dot-com/aphiria/nginx:latest
          docker tag aphiria/php:latest registry.digitalocean.com/registry.digitalocean.com/aphiria-dot-com/aphiria/php:latest
          docker push registry.digitalocean.com/aphiria-dot-com/aphiria/php:latest
